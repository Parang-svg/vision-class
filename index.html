<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision High Master System</title>
    <!-- 라이브러리 및 도구 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase Compat 라이브러리 (안정적인 연결을 위해 사용) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-font-smoothing: antialiased; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        .animate-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#F8F9FB] text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --------------------------------------------------------------------------------
        // 1. Firebase & Config (선생님 전용 설정 고정)
        // --------------------------------------------------------------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyAhBsBu8BvHttPGJtpFPJxNEf6_TLIF0C0",
            authDomain: "vision-class-1461b.firebaseapp.com",
            projectId: "vision-class-1461b",
            storageBucket: "vision-class-1461b.firebasestorage.app",
            messagingSenderId: "1085621904229",
            appId: "1:1085621904229:web:34545f5783adb38670778c"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'vision-high-master-v1';

        // --------------------------------------------------------------------------------
        // 2. Icons (SVG Helper)
        // --------------------------------------------------------------------------------
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                dashboard: <><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
                folder: <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>,
                calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
                plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
                check: <polyline points="20 6 9 17 4 12"/>,
                x: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
                clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
                users: <><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
                settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
                logout: <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>,
                megaphone: <><path d="M11 15h2a2 2 0 1 0 0-4h-2"/><path d="M15 18l1 3"/><path d="M19.1 11l-3.9-3.9"/><path d="M11.6 16.8l-1.1 1.1c-1.2 1.2-3.1 1.2-4.2 0L2.1 13.7c-1.2-1.2-1.2-3.1 0-4.2l1.1-1.1"/><path d="M21 22h-1a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h1a2 2 0 0 1 2 2v16a2 2 0 0 1-2 2z"/></>,
                heart: <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || <circle cx="12" cy="12" r="10" />}
                </svg>
            );
        };

        // --------------------------------------------------------------------------------
        // 3. Utils & Styles
        // --------------------------------------------------------------------------------
        const INITIAL_SCHEDULE = {
            '월': [{start:'09:10', end:'11:00', s:'예배 / 그림전도'}, {start:'11:10', end:'12:30', s:'S&L (AI)'}, {start:'12:30', end:'14:00', s:'점심시간'}, {start:'14:00', end:'15:50', s:'자연과학 LAB'}, {start:'16:00', end:'16:50', s:'영어 (SOT)'}, {start:'16:50', end:'17:30', s:'저녁시간'}, {start:'17:30', end:'19:00', s:'자율학습'}],
            '화': [{start:'09:10', end:'10:00', s:'수학'}, {start:'10:10', end:'11:00', s:'영어 (SOT)'}, {start:'11:10', end:'12:30', s:'국어'}, {start:'12:30', end:'14:00', s:'점심시간'}, {start:'14:00', end:'15:50', s:'드로잉'}, {start:'16:00', end:'16:50', s:'IT & 경제'}, {start:'16:50', end:'17:30', s:'저녁시간'}, {start:'17:30', end:'19:00', s:'자율학습'}],
            '수': [{start:'09:10', end:'10:00', s:'평신도선교'}, {start:'10:10', end:'12:30', s:'Activity(EN)'}, {start:'12:30', end:'14:00', s:'점심시간'}, {start:'14:00', end:'15:50', s:'진로 탐구'}, {start:'16:00', end:'16:50', s:'동아리'}, {start:'16:50', end:'17:30', s:'저녁시간'}, {start:'17:30', end:'19:00', s:'자율학습'}],
            '목': [{start:'09:10', end:'11:00', s:'체육'}, {start:'11:10', end:'12:30', s:'역사'}, {start:'12:30', end:'14:00', s:'점심시간'}, {start:'14:00', end:'14:50', s:'CA'}, {start:'15:00', end:'15:50', s:'S & L'}, {start:'16:00', end:'16:50', s:'IT & 경제'}, {start:'16:50', end:'17:30', s:'저녁시간'}, {start:'17:30', end:'19:00', s:'자율학습'}],
            '금': [{start:'09:10', end:'11:00', s:'수학'}, {start:'11:10', end:'12:00', s:'PEER Class'}, {start:'12:00', end:'12:30', s:'자기점검'}, {start:'12:30', end:'14:00', s:'점심시간'}, {start:'14:00', end:'14:50', s:'시사'}, {start:'15:00', end:'16:50', s:'오케스트라'}, {start:'16:50', end:'17:30', s:'저녁시간'}, {start:'17:30', end:'19:00', s:'자율학습'}]
        };

        const getBlockStyle = (s) => {
            if (s.includes('점심') || s.includes('저녁')) return 'bg-orange-100 border-l-4 border-orange-400 text-orange-900 shadow-orange-100/50';
            if (s.includes('자율') || s.includes('자기점검')) return 'bg-teal-100 border-l-4 border-teal-400 text-teal-900 shadow-teal-100/50';
            if (s.includes('예배') || s.includes('선교') || s.includes('Activity')) return 'bg-fuchsia-100 border-l-4 border-fuchsia-400 text-fuchsia-900 shadow-fuchsia-100/50';
            return 'bg-blue-100 border-l-4 border-blue-400 text-blue-900 shadow-blue-100/50'; 
        };

        const timeToMinutes = (t) => { const [h, m] = (t || '00:00').split(':').map(Number); return h * 60 + m; };

        // --------------------------------------------------------------------------------
        // 4. Main App Components
        // --------------------------------------------------------------------------------

        function LoginScreen({ onLogin }) {
            const [pin, setPin] = useState('');
            const [isTeacher, setIsTeacher] = useState(false);
            const names = ['강태원', '김남우', '원의재', '현준서', '강서연', '유명희', '권새롬', '김사랑', '김현우'];
            const [sn, setSn] = useState(names[0]);

            const handleLogin = () => {
                if(isTeacher) {
                    if(pin==='2026!') onLogin({name:'관리자', role:'teacher'});
                    else alert('비밀번호 오류');
                } else {
                    if(pin==='1111') onLogin({name:sn, role:'student'});
                    else alert('PIN 오류');
                }
            };

            return (
                <div className="fixed inset-0 bg-slate-900 flex items-center justify-center p-6 z-50">
                    <div className="bg-white w-full max-w-md rounded-[3rem] p-10 md:p-12 shadow-2xl text-center relative overflow-hidden animate-in">
                        <button onClick={()=>setIsTeacher(!isTeacher)} className="absolute top-6 right-6 p-2 text-slate-300 hover:text-indigo-600 transition-colors">
                            <Icon name="settings" size={20}/>
                        </button>
                        <div className="w-20 h-20 bg-indigo-50 rounded-3xl flex items-center justify-center mx-auto mb-8 text-indigo-600 shadow-inner">
                            <Icon name="dashboard" size={40} />
                        </div>
                        <h2 className="text-3xl font-black text-slate-900 mb-2 tracking-tighter">Vision High</h2>
                        <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-10">{isTeacher ? 'Teacher Mode' : 'Student Portal'}</p>
                        <div className="space-y-4 text-slate-900">
                            {!isTeacher && (
                                <div className="text-left">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-2 block">학생 이름 선택</label>
                                    <select value={sn} onChange={e=>setSn(e.target.value)} className="w-full bg-slate-50 border border-slate-200 px-6 py-4 rounded-2xl font-bold appearance-none text-center outline-none focus:ring-4 focus:ring-indigo-100 transition-all">
                                        {names.map(n=><option key={n} value={n}>{n}</option>)}
                                    </select>
                                </div>
                            )}
                            <div className="text-left">
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-2 block">{isTeacher ? '관리자 비밀번호' : '접속 PIN 번호'}</label>
                                <input type="password" value={pin} onChange={e=>setPin(e.target.value)} placeholder={isTeacher?'비밀번호 입력':'1111 입력'} className="w-full bg-slate-50 border border-slate-200 px-6 py-4 rounded-2xl font-black text-center outline-none focus:ring-4 focus:ring-indigo-100 transition-all" onKeyDown={e=>e.key==='Enter'&&handleLogin()}/>
                            </div>
                            <button onClick={handleLogin} className="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl hover:bg-indigo-700 transition-all mt-4 hover:-translate-y-1">시스템 접속</button>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [authUser, setAuthUser] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [students, setStudents] = useState([]);
            const [subjects, setSubjects] = useState([]);
            const [tasks, setTasks] = useState([]);
            const [classSettings, setClassSettings] = useState({ bibleRange: '사도행전 1-5장' });
            const [schedule, setSchedule] = useState(INITIAL_SCHEDULE);

            useEffect(() => {
                auth.signInAnonymously().catch(console.error);
                const unsubAuth = auth.onAuthStateChanged(setUser);
                return () => unsubAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const path = `artifacts/${appId}/public/data`;
                const unsubS = db.collection(`${path}/students`).onSnapshot(s => setStudents(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubSubj = db.collection(`${path}/subjects`).onSnapshot(s => setSubjects(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubT = db.collection(`${path}/tasks`).onSnapshot(s => setTasks(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubCfg = db.doc(`${path}/settings/classConfig`).onSnapshot(d => { if(d.exists()) setClassSettings(d.data()); });
                const unsubSch = db.doc(`${path}/settings/schedule`).onSnapshot(d => { if(d.exists()) setSchedule(d.data()); });
                return () => { unsubS(); unsubSubj(); unsubT(); unsubCfg(); unsubSch(); };
            }, [user]);

            const seedData = async () => {
                const batch = db.batch();
                const path = `artifacts/${appId}/public/data`;
                const initialSubjects = [
                    { title: '학생자치', representative: '대의원/부대의원', category: 'Governance', isSpecial: true },
                    { title: 'S&L', representative: '김남우', category: 'Core Focus' },
                    { title: 'IT&경제', representative: '원의재', category: 'Exploration' },
                    { title: '자연과학LAB', representative: '김현우', category: 'Exploration' },
                    { title: 'English(SOT)', representative: '강서연', category: 'Core Focus' },
                    { title: '수학', representative: '현준서', category: 'Core Focus' },
                    { title: 'Design Studio', representative: '미정', category: 'Exploration' },
                    { title: '진로탐구', representative: '강태원', category: 'Exploration' },
                    { title: '국어', representative: '미정', category: 'Other' },
                    { title: '역사', representative: '미정', category: 'Other' }
                ];
                initialSubjects.forEach(s => {
                    const ref = db.collection(`${path}/subjects`).doc();
                    batch.set(ref, { ...s, progress: 0, driveUrl:'', hiClassUrl:'', createdAt:new Date().toISOString()});
                });
                ['강태원','김남우','원의재','현준서','강서연','유명희','권새롬','김사랑','김현우'].forEach(name => {
                    const ref = db.collection(`${path}/students`).doc();
                    batch.set(ref, { name, role: '학생', assignedSubjects: [], createdAt:new Date().toISOString() });
                });
                batch.set(db.doc(`${path}/settings/schedule`), INITIAL_SCHEDULE);
                await batch.commit();
                alert('10개 과목 및 학생 데이터 초기화 완료!');
            };

            if (!authUser) return <LoginScreen onLogin={setAuthUser} />;

            const today = ['일','월','화','수','목','금','토'][new Date().getDay()];
            const todaySchedule = schedule[today] || [];

            return (
                <div className="flex h-screen overflow-hidden text-slate-800 animate-in">
                    {/* Sidebar */}
                    <nav className="w-64 bg-slate-900 text-white flex flex-col p-6 shadow-2xl shrink-0 z-20">
                        <div className="mb-12 p-4 text-center border-b border-slate-800">
                            <h1 className="text-xl font-black italic tracking-tighter flex items-center justify-center gap-2">
                                <Icon name="dashboard" size={20} className="text-indigo-400" /> VISION HIGH
                            </h1>
                        </div>
                        <div className="space-y-2 flex-grow">
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'dashboard' ? 'bg-indigo-600 shadow-lg' : 'text-slate-400 hover:bg-slate-800'}`}>
                                <Icon name="dashboard" size={18} /> <span className="font-bold text-sm">대시보드</span>
                            </button>
                            <button onClick={() => setActiveTab('subjects')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'subjects' ? 'bg-indigo-600 shadow-lg' : 'text-slate-400 hover:bg-slate-800'}`}>
                                <Icon name="folder" size={18} /> <span className="font-bold text-sm">Subject Hub</span>
                            </button>
                            <button onClick={() => setActiveTab('calendar')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all ${activeTab === 'calendar' ? 'bg-indigo-600 shadow-lg' : 'text-slate-400 hover:bg-slate-800'}`}>
                                <Icon name="calendar" size={18} /> <span className="font-bold text-sm">통합 시간표</span>
                            </button>
                        </div>
                        <div className="mt-auto pt-6 border-t border-slate-800">
                            <div className="bg-slate-800/50 p-4 rounded-2xl flex items-center justify-between shadow-inner">
                                <div className="flex items-center gap-3">
                                    <div className="w-8 h-8 bg-indigo-600 rounded-full flex items-center justify-center font-black text-xs shadow-md">{authUser.name[0]}</div>
                                    <span className="font-bold text-sm tracking-tight">{authUser.name}</span>
                                </div>
                                <button onClick={() => setAuthUser(null)} className="text-slate-500 hover:text-red-400 transition-colors"><Icon name="logout" size={18} /></button>
                            </div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="flex-1 overflow-y-auto p-8 md:p-12 bg-[#F8F9FB] custom-scrollbar">
                        <header className="mb-12 flex flex-col md:flex-row md:justify-between md:items-end gap-4">
                            <div>
                                <h2 className="text-4xl font-black text-slate-900 tracking-tighter leading-tight">안녕하세요, {authUser.name}님!</h2>
                                <p className="text-slate-400 font-bold mt-2 uppercase tracking-widest text-[10px]">Today's Activity Board</p>
                            </div>
                            {authUser.role === 'teacher' && students.length === 0 && (
                                <button onClick={seedData} className="bg-amber-600 text-white px-8 py-3.5 rounded-2xl font-black shadow-xl hover:bg-amber-700 transition-all flex items-center gap-2 hover:-translate-y-1">
                                    <Icon name="plus" size={18} /> 시스템 초기 데이터 생성
                                </button>
                            )}
                        </header>

                        {activeTab === 'dashboard' && (
                            <div className="space-y-10">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                    <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 hover:shadow-xl transition-all group">
                                        <div className="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 mb-6 group-hover:scale-110 transition-transform"><Icon name="folder" /></div>
                                        <p className="text-slate-400 text-[11px] font-black uppercase tracking-widest">수강 과목</p>
                                        <h4 className="text-3xl font-black mt-1 text-slate-900">{subjects.length}개 폴더</h4>
                                    </div>
                                    <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 hover:shadow-xl transition-all group">
                                        <div className="w-12 h-12 bg-orange-50 rounded-2xl flex items-center justify-center text-orange-600 mb-6 group-hover:scale-110 transition-transform"><Icon name="clock" /></div>
                                        <p className="text-slate-400 text-[11px] font-black uppercase tracking-widest">승인 대기 활동</p>
                                        <h4 className="text-3xl font-black mt-1 text-slate-900">{tasks.filter(t=>t.status==='pending').length}건</h4>
                                    </div>
                                    <div className="bg-indigo-900 text-white p-8 rounded-[2.5rem] shadow-2xl flex flex-col justify-center relative overflow-hidden group">
                                        <Icon name="heart" size={140} className="absolute -right-8 -bottom-8 opacity-10 group-hover:scale-110 transition-transform duration-700" />
                                        <div className="relative z-10">
                                            <p className="text-indigo-400 text-[10px] font-black uppercase mb-2 tracking-[0.2em]">Bible Meditation</p>
                                            <h4 className="text-2xl font-black tracking-tight">{classSettings.bibleRange}</h4>
                                            <p className="text-indigo-200 text-[11px] mt-2 font-bold opacity-80">오늘의 말씀을 묵상하세요.</p>
                                        </div>
                                    </div>
                                </div>

                                {/* Timeline */}
                                <div className="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100 overflow-hidden relative">
                                    <h4 className="text-xl font-black mb-8 flex items-center gap-3 text-slate-800 uppercase tracking-tighter">
                                        <Icon name="clock" size={24} className="text-slate-400" /> Today's Timeline
                                    </h4>
                                    <div className="relative h-24 bg-slate-50 rounded-3xl overflow-hidden shadow-inner flex items-center px-4">
                                        {todaySchedule.length > 0 ? todaySchedule.map((item, idx) => {
                                            const startM = timeToMinutes(item.start); const endM = timeToMinutes(item.end);
                                            const dayStartM = 540; const totalM = 600; // 9:00 - 19:00
                                            const left = ((startM - dayStartM) / totalM) * 100;
                                            const width = ((endM - startM) / totalM) * 100;
                                            return (
                                                <div key={idx} className={`absolute h-16 rounded-2xl flex flex-col items-center justify-center shadow-sm cursor-pointer transition-all hover:scale-105 hover:z-10 ${getBlockStyle(item.s)}`} style={{left: `${left}%`, width: `${width}%`}}>
                                                    <span className="font-black text-[12px] truncate px-2">{item.s}</span>
                                                    <span className="text-[9px] font-bold opacity-60">{item.start}</span>
                                                </div>
                                            );
                                        }) : <p className="w-full text-center text-slate-300 font-bold italic">오늘은 수업 일정이 없습니다.</p>}
                                    </div>
                                </div>
                                
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <div className="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100">
                                        <h3 className="text-xl font-black mb-8 flex items-center gap-3 text-red-500 uppercase tracking-tighter"><Icon name="megaphone" size={28}/> Notice</h3>
                                        <div className="space-y-4 max-h-[300px] overflow-y-auto pr-2 custom-scrollbar">
                                            {tasks.filter(t=>t.taskType==='일반 공지').length > 0 ? tasks.filter(t=>t.taskType==='일반 공지').map(t=>(
                                                <div key={t.id} className="p-6 bg-red-50/50 rounded-3xl border border-red-100 group hover:shadow-md transition-all">
                                                    <p className="font-black text-slate-800 text-[15px]">{t.title}</p>
                                                    <p className="text-[11px] text-red-400 font-bold mt-1">{t.dueDate} 마감</p>
                                                </div>
                                            )) : <p className="text-slate-300 italic text-center py-20">진행 중인 공지가 없습니다.</p>}
                                        </div>
                                    </div>
                                    <div className="bg-white p-10 rounded-[3rem] shadow-sm border border-slate-100">
                                        <h3 className="text-xl font-black mb-8 flex items-center gap-3 text-indigo-600 uppercase tracking-tighter"><Icon name="check" size={28}/> Tasks</h3>
                                        <div className="space-y-4 max-h-[300px] overflow-y-auto pr-2 custom-scrollbar">
                                            {tasks.filter(t=>t.taskType!=='일반 공지').length > 0 ? tasks.filter(t=>t.taskType!=='일반 공지').map(t=>(
                                                <div key={t.id} className="p-6 bg-slate-50/80 rounded-3xl border border-slate-100 group hover:shadow-md transition-all flex justify-between items-center">
                                                    <div><p className="font-black text-slate-800 text-[15px]">{t.title}</p><p className="text-[11px] text-slate-400 font-bold mt-1 uppercase">{t.subjectId}</p></div>
                                                    <Icon name="check" size={20} className="text-slate-200 group-hover:text-indigo-400" />
                                                </div>
                                            )) : <p className="text-slate-300 italic text-center py-20">진행 중인 과제가 없습니다.</p>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'subjects' && (
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                                {subjects.map(s => (
                                    <div key={s.id} className="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100 hover:shadow-2xl hover:-translate-y-2 transition-all group cursor-pointer">
                                        <div className="w-14 h-14 bg-slate-50 text-slate-400 rounded-2xl flex items-center justify-center mb-8 group-hover:bg-indigo-600 group-hover:text-white transition-all shadow-inner">
                                            <Icon name="folder" size={28} />
                                        </div>
                                        <h4 className="text-2xl font-black mb-2 tracking-tight text-slate-900">{s.title}</h4>
                                        <p className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-6">Asst: {s.representative}</p>
                                        <div className="w-full bg-slate-100 h-2 rounded-full overflow-hidden mb-4 shadow-inner">
                                            <div className="bg-indigo-600 h-full transition-all duration-1000" style={{width: `${s.progress}%`}}></div>
                                        </div>
                                        <div className="flex justify-between items-center"><span className="text-[10px] font-black text-indigo-500 uppercase tracking-widest">{s.progress}% Progress</span><Icon name="check" size={16} className="text-slate-200" /></div>
                                    </div>
                                ))}
                            </div>
                        )}
                        
                        {activeTab === 'calendar' && (
                            <div className="bg-white p-16 rounded-[4rem] shadow-sm border border-slate-100 text-center animate-pulse">
                                <Icon name="calendar" size={60} className="mx-auto text-slate-100 mb-6" />
                                <p className="text-slate-400 font-black text-xl tracking-tight leading-relaxed">통합 시간표 데이터가 <br/> 동기화 중입니다.</p>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
