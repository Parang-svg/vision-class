<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision High Master System</title>
    
    <!-- 필수 라이브러리 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel standalone 오류 방지용 최신 버전 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome (에러 없는 안전한 아이콘) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase Compat (가장 안정적인 단일 파일용 연결) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-font-smoothing: antialiased; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#F8F9FB] text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --------------------------------------------------------------------------------
        // 1. Firebase Config (★ 선생님이 찾으신 진짜 API 키가 드디어 들어갔습니다! ★)
        // --------------------------------------------------------------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyAhBsBu8BvHttpPGJtpFPJxnEf6_TLIF0C0",
            authDomain: "vision-class-1461b.firebaseapp.com",
            projectId: "vision-class-1461b",
            storageBucket: "vision-class-1461b.firebasestorage.app",
            messagingSenderId: "1085621904229",
            appId: "1:1085621904229:web:34545f5783adb38670778c"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'vision-high-master-final-v4';

        // --------------------------------------------------------------------------------
        // 2. Icon Helper & Constants
        // --------------------------------------------------------------------------------
        const Icon = ({ name, size = 18, className = "" }) => {
            const faMap = {
                dashboard: 'fa-solid fa-chart-pie', folder: 'fa-solid fa-folder-open', calendar: 'fa-regular fa-calendar-days',
                plus: 'fa-solid fa-plus', check: 'fa-solid fa-check', x: 'fa-solid fa-xmark', clock: 'fa-regular fa-clock',
                users: 'fa-solid fa-user-group', settings: 'fa-solid fa-gear', logout: 'fa-solid fa-arrow-right-from-bracket',
                megaphone: 'fa-solid fa-bullhorn', edit: 'fa-solid fa-pen-to-square', heart: 'fa-solid fa-heart',
                link: 'fa-solid fa-link', list: 'fa-solid fa-list-check', trash: 'fa-solid fa-trash-can'
            };
            return <i className={`${faMap[name]} ${className}`} style={{ fontSize: `${size}px` }}></i>;
        };

        const INITIAL_SCHEDULE = {
            '월': [{start:'09:10', end:'11:00', s:'예배 / 그림전도'}, {start:'11:10', end:'12:30', s:'S&L (AI)'}, {start:'12:30', end:'14:00', s:'점심시간'}, {start:'14:00', end:'15:50', s:'자연과학 LAB'}, {start:'16:00', end:'16:50', s:'영어 (SOT)'}, {start:'16:50', end:'17:30', s:'저녁시간'}, {start:'17:30', end:'19:00', s:'자율학습'}],
            '화': [{start:'09:10', end:'10:00', s:'수학'}, {start:'10:10', end:'11:00', s:'영어 (SOT)'}, {start:'11:10', end:'12:30', s:'국어'}, {start:'12:30', end:'14:00', s:'점심시간'}, {start:'14:00', end:'15:50', s:'드로잉'}, {start:'16:00', end:'16:50', s:'IT & 경제'}, {start:'16:50', end:'17:30', s:'저녁시간'}, {start:'17:30', end:'19:00', s:'자율학습'}],
            '수': [{start:'09:10', end:'10:00', s:'평신도선교'}, {start:'10:10', end:'12:30', s:'Activity(EN)'}, {start:'12:30', end:'14:00', s:'점심시간'}, {start:'14:00', end:'15:50', s:'진로 탐구'}, {start:'16:00', end:'16:50', s:'동아리'}, {start:'16:50', end:'17:30', s:'저녁시간'}, {start:'17:30', end:'19:00', s:'자율학습'}],
            '목': [{start:'09:10', end:'11:00', s:'체육'}, {start:'11:10', end:'12:30', s:'역사'}, {start:'12:30', end:'14:00', s:'점심시간'}, {start:'14:00', end:'14:50', s:'CA'}, {start:'15:00', end:'15:50', s:'S & L'}, {start:'16:00', end:'16:50', s:'IT & 경제'}, {start:'16:50', end:'17:30', s:'저녁시간'}, {start:'17:30', end:'19:00', s:'자율학습'}],
            '금': [{start:'09:10', end:'11:00', s:'수학'}, {start:'11:10', end:'12:00', s:'PEER Class'}, {start:'12:00', end:'12:30', s:'자기점검'}, {start:'12:30', end:'14:00', s:'점심시간'}, {start:'14:00', end:'14:50', s:'시사'}, {start:'15:00', end:'16:50', s:'오케스트라'}, {start:'16:50', end:'17:30', s:'저녁시간'}, {start:'17:30', end:'19:00', s:'자율학습'}]
        };

        const timeToMinutes = (t) => { const [h, m] = (t || '00:00').split(':').map(Number); return h * 60 + m; };
        const getBlockStyle = (s) => {
            if (s.includes('점심') || s.includes('저녁')) return 'bg-orange-100 border-l-4 border-orange-400 text-orange-900 shadow-orange-100/50';
            if (s.includes('자율') || s.includes('자기점검')) return 'bg-teal-100 border-l-4 border-teal-400 text-teal-900 shadow-teal-100/50';
            if (s.includes('예배') || s.includes('선교') || s.includes('Activity')) return 'bg-fuchsia-100 border-l-4 border-fuchsia-400 text-fuchsia-900 shadow-fuchsia-100/50';
            return 'bg-blue-100 border-l-4 border-blue-400 text-blue-900 shadow-blue-100/50'; 
        };

        // --------------------------------------------------------------------------------
        // 3. Modals (수정 모달, 팀장 일괄 제출 모달 등)
        // --------------------------------------------------------------------------------
        function FormModal({ title, fields, initialData, onSubmit, onClose }) {
            const [formData, setFormData] = useState(initialData || {});
            return (
                <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div className="bg-white w-full max-w-xl rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden animate-in">
                        <div className="p-6 border-b border-slate-100 flex justify-between items-center"><h3 className="font-black text-xl">{title}</h3><button onClick={onClose} className="p-2 text-slate-400"><Icon name="x"/></button></div>
                        <div className="p-6 space-y-4 overflow-y-auto max-h-[60vh] custom-scrollbar">
                            {fields.map(f => (
                                <div key={f.name}>
                                    <label className="text-xs font-black text-slate-500 uppercase block mb-1">{f.label}</label>
                                    {f.type === 'select' ? (
                                        <select value={formData[f.name]||''} onChange={e=>setFormData({...formData,[f.name]:e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none">{f.options.map(o=><option key={o} value={o}>{o}</option>)}</select>
                                    ) : f.type === 'date' ? (
                                        <input type="date" value={formData[f.name]||''} onChange={e=>setFormData({...formData,[f.name]:e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl font-bold outline-none"/>
                                    ) : f.type === 'textarea' ? (
                                        <textarea rows="3" value={formData[f.name]||''} onChange={e=>setFormData({...formData,[f.name]:e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none"/>
                                    ) : (
                                        <input type="text" value={formData[f.name]||''} onChange={e=>setFormData({...formData,[f.name]:e.target.value})} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none"/>
                                    )}
                                </div>
                            ))}
                        </div>
                        <div className="p-6 bg-slate-50 flex gap-3"><button onClick={onClose} className="flex-1 bg-white border border-slate-200 py-3 rounded-xl font-black">취소</button><button onClick={()=>onSubmit(formData)} className="flex-[2] bg-indigo-600 text-white py-3 rounded-xl font-black shadow-md">완료</button></div>
                    </div>
                </div>
            );
        }

        // 팀장 일괄 제출 모달
        function GroupSubmitModal({ config, students, onSave, onClose }) {
            const { task, currentUser } = config;
            const [selected, setSelected] = useState(currentUser.role === 'student' ? [currentUser.name] : []);
            const toggle = (name) => { setSelected(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]); };
            
            return (
                <div className="fixed inset-0 bg-slate-900/90 backdrop-blur-sm flex items-center justify-center z-[100] p-6">
                    <div className="bg-white w-full max-w-xl rounded-[3rem] p-8 flex flex-col max-h-[85vh] animate-in">
                        <div className="flex justify-between items-center mb-6 border-b border-slate-100 pb-4">
                            <div><h3 className="text-2xl font-black">팀장 일괄 제출</h3><p className="text-indigo-600 font-bold text-xs mt-1">{task.title}</p></div>
                            <button onClick={onClose} className="p-2 text-slate-400 bg-slate-100 rounded-full"><Icon name="x" size={16}/></button>
                        </div>
                        <div className="bg-indigo-50 p-4 rounded-xl mb-6"><p className="text-indigo-800 text-[13px] font-black">참여한 팀원들의 이름을 모두 선택해 주세요.</p></div>
                        <div className="grid grid-cols-2 gap-3 overflow-y-auto mb-6 custom-scrollbar pr-2">
                            {students.map(s => (
                                <button key={s.id} onClick={()=>toggle(s.name)} className={`p-4 rounded-2xl border-2 font-black transition-all ${selected.includes(s.name)?'bg-indigo-600 text-white border-indigo-600 shadow-md':'bg-white text-slate-600 border-slate-200'}`}>
                                    {s.name} {selected.includes(s.name) && <Icon name="check" size={14} className="inline-block ml-1"/>}
                                </button>
                            ))}
                        </div>
                        <div className="flex gap-4 pt-4 border-t border-slate-100">
                            <button onClick={onClose} className="flex-1 py-4 bg-slate-100 text-slate-500 rounded-xl font-black">취소</button>
                            <button onClick={()=>onSave(task.id, selected)} disabled={selected.length===0} className="flex-[2] py-4 bg-indigo-600 text-white disabled:bg-slate-300 rounded-xl font-black shadow-xl flex items-center justify-center gap-2"><Icon name="users" size={16}/> {selected.length}명 일괄 제출</button>
                        </div>
                    </div>
                </div>
            );
        }

        // --------------------------------------------------------------------------------
        // 4. Main App
        // --------------------------------------------------------------------------------
        function App({ authUser, setAuthUser }) {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [students, setStudents] = useState([]);
            const [subjects, setSubjects] = useState([]);
            const [tasks, setTasks] = useState([]);
            const [submissions, setSubmissions] = useState({});
            const [schedule, setSchedule] = useState(INITIAL_SCHEDULE);
            const [classSettings, setClassSettings] = useState({ bibleRange: '사도행전 1-5장' });
            
            const [selectedSubject, setSelectedSubject] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(null);
            const [editingTask, setEditingTask] = useState(null);
            const [groupSubmitConfig, setGroupSubmitConfig] = useState(null);

            // 데이터 실시간 동기화
            useEffect(() => {
                const path = `artifacts/${appId}/public/data`;
                const unsubS = db.collection(`${path}/students`).onSnapshot(s => setStudents(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubSubj = db.collection(`${path}/subjects`).onSnapshot(s => setSubjects(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubT = db.collection(`${path}/tasks`).onSnapshot(s => setTasks(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubM = db.collection(`${path}/submissions`).onSnapshot(s => { const sm={}; s.docs.forEach(d=>sm[d.id]=d.data()); setSubmissions(sm); });
                const unsubSch = db.doc(`${path}/settings/schedule`).onSnapshot(d => { if(d.exists) setSchedule(d.data()); });
                const unsubCfg = db.doc(`${path}/settings/classConfig`).onSnapshot(d => { if(d.exists) setClassSettings(d.data()); });
                return () => { unsubS(); unsubSubj(); unsubT(); unsubM(); unsubSch(); unsubCfg(); };
            }, []);

            // 15개 과목 완벽 초기화
            const seedData = async () => {
                const batch = db.batch();
                const path = `artifacts/${appId}/public/data`;
                const initialSubjects = [
                    { title: '학생자치', representative: '대의원', category: 'Governance', isSpecial: true },
                    { title: 'S&L', representative: '김남우', category: 'Core Focus' }, { title: 'IT&경제', representative: '원의재', category: 'Exploration' },
                    { title: '자연과학LAB', representative: '김현우', category: 'Exploration' }, { title: 'English(SOT)', representative: '강서연', category: 'Core Focus' },
                    { title: '수학', representative: '현준서', category: 'Core Focus' }, { title: 'Design Studio', representative: '미정', category: 'Exploration' },
                    { title: 'English Activity', representative: '김사랑', category: 'Community' }, { title: '진로탐구', representative: '강태원', category: 'Exploration' },
                    { title: 'CA', representative: '미정', category: 'Community' }, { title: 'PEER Class', representative: '미정', category: 'Community' },
                    { title: '국어', representative: '미정', category: 'Other' }, { title: '역사', representative: '미정', category: 'Other' },
                    { title: '드로잉', representative: '미정', category: 'Other' }, { title: '시사', representative: '미정', category: 'Other' }
                ];
                initialSubjects.forEach(s => { batch.set(db.collection(`${path}/subjects`).doc(), { ...s, progress: 0, driveUrl:'', createdAt:new Date().toISOString()}); });
                ['강태원','김남우','원의재','현준서','강서연','유명희','권새롬','김사랑','김현우'].forEach(name => {
                    batch.set(db.collection(`${path}/students`).doc(), { name, role: name==='강서연'?'대의원':name==='원의재'?'부대의원':name==='김남우'?'서기':'학생' });
                });
                batch.set(db.doc(`${path}/settings/schedule`), INITIAL_SCHEDULE);
                batch.set(db.doc(`${path}/settings/classConfig`), { bibleRange: '사도행전 1-5장' });
                await batch.commit();
                alert('15개 과목 및 모든 데이터가 완벽하게 세팅되었습니다!');
            };

            const toggleSubmission = (tid, sn, type) => {
                const id = `${tid}_${sn}`;
                const cur = submissions[id] || { student: false, teacher: false };
                db.doc(`artifacts/${appId}/public/data/submissions/${id}`).set({ ...cur, [type]: !cur[type] }, { merge: true });
            };

            const handleGroupSubmit = (taskId, selectedNames) => {
                const batch = db.batch();
                selectedNames.forEach(name => {
                    const id = `${taskId}_${name}`;
                    const cur = submissions[id] || { student: false, teacher: false };
                    batch.set(db.doc(`artifacts/${appId}/public/data/submissions/${id}`), { ...cur, student: true }, { merge: true });
                });
                batch.commit().then(() => setGroupSubmitConfig(null));
            };

            const handleAddTask = async (data) => {
                if (!data.dueDate) return alert("마감 날짜 필수!");
                const finalData = { ...data, day: ['일','월','화','수','목','금','토'][new Date(data.dueDate).getDay()], status: authUser.role === 'teacher' ? 'approved' : 'pending' };
                if (editingTask?.id) await db.doc(`artifacts/${appId}/public/data/tasks/${editingTask.id}`).update(finalData);
                else await db.collection(`artifacts/${appId}/public/data/tasks`).add({...finalData, createdAt: new Date().toISOString()});
                setEditingTask(null); setIsModalOpen(null);
            };

            // 시간표 편집 로직
            const [localSchedule, setLocalSchedule] = useState({});
            const [editingDay, setEditingDay] = useState('월');
            useEffect(() => { setLocalSchedule(schedule || {}); }, [schedule]);
            const updateSlot = (idx, field, val) => { const d = [...(localSchedule[editingDay] || [])]; d[idx][field] = val; setLocalSchedule({...localSchedule, [editingDay]: d}); };
            const addSlot = () => { const d = localSchedule[editingDay] || []; setLocalSchedule({...localSchedule, [editingDay]: [...d, {start:'09:00', end:'10:00', s:'새 일정'}]}); };
            const removeSlot = (idx) => { const d = [...localSchedule[editingDay]]; d.splice(idx, 1); setLocalSchedule({...localSchedule, [editingDay]: d}); };
            const saveSchedule = () => { db.doc(`artifacts/${appId}/public/data/settings/schedule`).set(localSchedule).then(()=>alert('시간표가 저장되었습니다.')); };

            const role = authUser.role;
            const approvedTasks = tasks.filter(t => t.status === 'approved');
            const today = ['일','월','화','수','목','금','토'][new Date().getDay()];
            const todaySchedule = schedule[today] || [];

            return (
                <div className="flex h-screen bg-slate-50 text-slate-800 font-sans text-[13px]">
                    {/* 네비게이션 */}
                    <nav className="w-60 bg-slate-900 text-white p-5 flex flex-col shrink-0 z-20">
                        <h1 className="text-lg font-black italic mb-10 text-center text-indigo-400">VISION HIGH</h1>
                        <div className="space-y-2 flex-grow">
                            <button onClick={()=>setActiveTab('dashboard')} className={`w-full flex items-center gap-3 p-3 rounded-xl ${activeTab==='dashboard'?'bg-indigo-600':'hover:bg-slate-800'} transition-all`}><Icon name="dashboard"/> 대시보드</button>
                            <button onClick={()=>{setActiveTab('subjects'); setSelectedSubject(null);}} className={`w-full flex items-center gap-3 p-3 rounded-xl ${activeTab==='subjects'?'bg-indigo-600':'hover:bg-slate-800'} transition-all`}><Icon name="folder"/> 과목 폴더</button>
                            <button onClick={()=>setActiveTab('calendar')} className={`w-full flex items-center gap-3 p-3 rounded-xl ${activeTab==='calendar'?'bg-indigo-600':'hover:bg-slate-800'} transition-all`}><Icon name="calendar"/> 통합 시간표</button>
                            {role==='teacher' && (
                                <React.Fragment>
                                    <div className="pt-4 pb-2 px-2 text-[10px] font-black text-slate-500 uppercase tracking-widest">Admin</div>
                                    <button onClick={()=>setActiveTab('status')} className={`w-full flex items-center gap-3 p-3 rounded-xl ${activeTab==='status'?'bg-indigo-600':'hover:bg-slate-800'} transition-all`}><Icon name="list"/> 제출 현황판</button>
                                    <button onClick={()=>setActiveTab('approval')} className={`w-full flex items-center gap-3 p-3 rounded-xl ${activeTab==='approval'?'bg-indigo-600':'hover:bg-slate-800'} transition-all`}><Icon name="edit"/> 활동 승인 <span className="ml-auto bg-red-500 px-2 rounded-full text-[10px]">{tasks.filter(t=>t.status==='pending').length}</span></button>
                                </React.Fragment>
                            )}
                            {role==='student' && <button onClick={()=>setActiveTab('approval')} className={`w-full flex items-center gap-3 p-3 rounded-xl ${activeTab==='approval'?'bg-indigo-600':'hover:bg-slate-800'} transition-all`}><Icon name="edit"/> 조교 활동 작성</button>}
                        </div>
                        <div className="mt-auto bg-slate-800/50 p-4 rounded-xl flex justify-between items-center">
                            <span className="font-bold flex items-center gap-2"><div className="w-6 h-6 bg-indigo-600 rounded-full flex items-center justify-center text-[10px]">{authUser.name[0]}</div>{authUser.name}</span>
                            <button onClick={()=>setAuthUser(null)} className="text-red-400 hover:text-white"><Icon name="logout"/></button>
                        </div>
                    </nav>

                    {/* 메인 화면 */}
                    <main className="flex-1 overflow-y-auto p-8 md:p-12 custom-scrollbar">
                        <header className="mb-10 flex justify-between items-end">
                            <div><h2 className="text-3xl font-black">안녕하세요, {authUser.name}님!</h2><p className="text-slate-400 font-bold mt-2 uppercase tracking-widest text-[10px]">Today's Activity Board</p></div>
                            {role==='teacher' && students.length===0 && <button onClick={seedData} className="bg-amber-600 text-white px-6 py-3 rounded-xl font-black shadow-lg hover:bg-amber-700">시스템 초기 15개 과목 세팅</button>}
                        </header>

                        {/* 1. 대시보드 뷰 */}
                        {activeTab === 'dashboard' && (
                            <div className="space-y-8 animate-in">
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm"><p className="text-xs text-slate-400 font-bold mb-1">수강 폴더</p><h4 className="text-2xl font-black">{subjects.length}개</h4></div>
                                    <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm"><p className="text-xs text-slate-400 font-bold mb-1">참여 학생</p><h4 className="text-2xl font-black">{students.length}명</h4></div>
                                    <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm col-span-2 bg-indigo-900 text-white flex justify-between items-center relative overflow-hidden group">
                                        <Icon name="heart" size={100} className="absolute -right-4 -bottom-4 text-indigo-800 opacity-30 group-hover:scale-110 transition-transform" />

                                            const left = ((timeToMinutes(item.start) - 540) / 600) * 100; 
                                            const width = ((timeToMinutes(item.end) - timeToMinutes(item.start)) / 600) * 100;
                                            return (
                                                <div key={idx} onClick={()=>{const sub=subjects.find(s=>s.title.includes(item.s.split(' ')[0])); if(sub){setSelectedSubject(sub); setActiveTab('subjects');}}} className={`absolute h-12 rounded-xl flex items-center justify-center cursor-pointer shadow-sm transition-all hover:scale-105 hover:z-10 ${getBlockStyle(item.s)}`} style={{left:`${left}%`, width:`${width}%`}}>
                                                    <span className="text-[11px] font-black px-2 truncate">{item.s}</span>
                                                </div>

                                        })}
                                    </div>
                                </div>

                                                <div key={d} className="bg-slate-50 p-4 rounded-2xl min-h-[200px] border border-slate-100">
                                                    <h4 className="text-center font-black text-sm text-slate-500 mb-4">{d}</h4>
                                                    <div className="space-y-3">
                                                        {dayTasks.length === 0 && <p className="text-center text-slate-300 text-xs font-bold mt-10">과제 없음</p>}

                                                            <div key={t.id} onClick={()=>{const sub=subjects.find(s=>s.title===t.subjectId); if(sub){setSelectedSubject(sub); setActiveTab('subjects');}}} className={`text-white p-3 rounded-xl cursor-pointer hover:-translate-y-1 transition-transform shadow-md ${t.taskType==='그룹 과제'?'bg-purple-600':'bg-indigo-600'}`}>
                                                                <p className="text-[9px] font-bold opacity-70 mb-1">{t.subjectId}</p>
                                                                <p className="text-[13px] font-black line-clamp-2 leading-snug">{t.title}</p>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* 공지사항 */}
                                <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-100">

                                    <div className="space-y-3">
                                        {approvedTasks.filter(t=>t.taskType==='일반 공지').length === 0 && <p className="text-slate-400 italic">공지사항이 없습니다.</p>}
                                        {approvedTasks.filter(t=>t.taskType==='일반 공지').map(t=>(
                                            <div key={t.id} className="p-5 bg-red-50 rounded-xl border border-red-100 flex justify-between items-center shadow-sm">
                                                <p className="font-black text-slate-800 text-[15px]">{t.title}</p>
                                                <span className="text-xs text-red-400 font-bold bg-white px-3 py-1 rounded-lg border border-red-100">{t.dueDate} 마감</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                        {/* 2. 과목 폴더 뷰 */}
                        {activeTab === 'subjects' && (
                            selectedSubject ? (
                                <div className="bg-white p-10 rounded-3xl shadow-sm border border-slate-100 animate-in">
                                    <div className="flex justify-between items-center border-b border-slate-100 pb-6 mb-8">
                                        <div>
                                            <button onClick={()=>setSelectedSubject(null)} className="text-slate-400 font-black mb-4 hover:text-indigo-600 transition-colors">← 뒤로 가기</button>
                                            <h3 className="text-4xl font-black">{selectedSubject.title}</h3>
                                            <p className="text-indigo-500 font-bold mt-2 text-xs uppercase tracking-widest">조교: {selectedSubject.representative}</p>
                                        </div>
                                        <div className="flex gap-2">
                                            {selectedSubject.driveUrl && <a href={selectedSubject.driveUrl} target="_blank" className="px-5 py-3 bg-blue-600 text-white rounded-xl font-bold text-xs shadow-md hover:bg-blue-700 flex items-center gap-2"><Icon name="link"/> 자료실</a>}

                                    </div>
                                    
                                    <div className="space-y-6">
                                        <div className="flex justify-between items-center mb-4">
                                            <h4 className="font-black text-xl flex items-center gap-2"><Icon name="list" className="text-indigo-500"/> 과제 목록</h4>
                                            <button onClick={()=>{setEditingTask({subjectId:selectedSubject.title, taskType:'개별 과제'}); setIsModalOpen('task');}} className="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-sm hover:bg-indigo-700 flex items-center gap-2"><Icon name="plus"/> 과제 추가</button>

                                                <div className="flex justify-between mb-4">
                                                    <div>
                                                        <span className={`text-[10px] font-black px-2.5 py-1 rounded-md mb-2 inline-block ${t.taskType==='그룹 과제'?'bg-purple-100 text-purple-700':t.taskType==='일반 공지'?'bg-red-100 text-red-700':'bg-indigo-100 text-indigo-700'}`}>{t.taskType}</span>
                                                        <h5 className="font-black text-xl">{t.title}</h5>
                                                    </div>
                                                    <div className="text-right">
                                                        <p className="text-[10px] font-black text-indigo-600">{t.day}요일</p>
                                                        <p className="text-[11px] font-bold text-slate-400">{t.dueDate}</p>
                                                    </div>
                                                </div>
                                                <p className="text-[14px] text-slate-600 mb-6 leading-relaxed whitespace-pre-wrap">{t.content}</p>

                                                    <div className="pt-6 border-t border-slate-200">
                                                        {t.taskType === '그룹 과제' && <button onClick={()=>setGroupSubmitConfig({task:t, currentUser:authUser})} className="w-full sm:w-auto mb-6 bg-purple-600 text-white px-5 py-3 rounded-xl font-black text-xs flex items-center justify-center gap-2 shadow-md hover:bg-purple-700 transition-colors"><Icon name="users"/> 팀장 일괄 제출하기</button>}
                                                        <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3">
                                                            {students.map(s => {
                                                                const sub = submissions[`${t.id}_${s.name}`] || { student: false, teacher: false };
                                                                return (
                                                                    <div key={s.id} className={`p-3 rounded-xl border text-center transition-colors ${sub.student?'bg-indigo-50 border-indigo-200':'bg-white border-slate-200'}`}>
                                                                        <p className={`text-[11px] font-black mb-2 truncate ${sub.student?'text-indigo-800':'text-slate-700'}`}>{s.name}</p>
                                                                        <div className="flex gap-1">
                                                                            <button onClick={()=>toggleSubmission(t.id, s.name, 'student')} className={`flex-1 py-1.5 rounded-lg text-[9px] font-bold transition-colors ${sub.student?'bg-indigo-600 text-white':'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>제출</button>
                                                                            {role==='teacher' && <button onClick={()=>toggleSubmission(t.id, s.name, 'teacher')} className={`flex-1 py-1.5 rounded-lg text-[9px] font-bold transition-colors ${sub.teacher?'bg-green-500 text-white shadow-inner':'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>{sub.teacher?<Icon name="check" size={10}/>:'확인'}</button>}
                                                                        </div>
                                                                    </div>
                                                                )
                                                            })}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 sm:grid-cols-3 lg:grid-cols-4 gap-6 animate-in">
                                    {subjects.map(s => (
                                        <div key={s.id} onClick={()=>setSelectedSubject(s)} className="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 cursor-pointer hover:shadow-xl hover:-translate-y-2 transition-all group">
                                            <div className="w-14 h-14 bg-slate-50 text-slate-400 rounded-2xl flex items-center justify-center mb-6 group-hover:bg-indigo-600 group-hover:text-white transition-colors"><Icon name="folder" size={24}/></div>
                                            <h4 className="font-black text-xl mb-1">{s.title}</h4>
                                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Asst: {s.representative}</p>
                                        </div>
                                    ))}
                                </div>
                            )
                        )}

                        {/* 3. 통합 시간표 (뷰어 및 편집기) */}
                        {activeTab === 'calendar' && (
                            <div className="animate-in space-y-6">
                                {role === 'teacher' && (
                                    <div className="bg-white p-8 rounded-3xl shadow-sm border border-slate-100 mb-8">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="text-xl font-black flex items-center gap-2"><Icon name="edit" className="text-indigo-500"/> 시간표 마스터 편집기</h3>
                                            <button onClick={saveSchedule} className="bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-bold text-xs flex items-center gap-2 hover:bg-indigo-700"><Icon name="save"/> 시간표 저장</button>
                                        </div>
                                        <div className="flex gap-2 mb-6 border-b border-slate-100 pb-4 overflow-x-auto">
                                            {['월','화','수','목','금'].map(d=>(
                                                <button key={d} onClick={()=>setEditingDay(d)} className={`px-6 py-2 rounded-xl font-black text-sm shrink-0 transition-colors ${editingDay===d?'bg-slate-900 text-white':'bg-slate-50 text-slate-500 hover:bg-slate-100'}`}>{d}요일</button>
                                            ))}
                                            <button onClick={addSlot} className="px-4 py-2 bg-indigo-50 text-indigo-600 rounded-xl ml-auto hover:bg-indigo-100"><Icon name="plus"/></button>
                                        </div>
                                        <div className="space-y-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                                            {(localSchedule[editingDay]||[]).map((slot, idx)=>(
                                                <div key={idx} className="flex flex-wrap md:flex-nowrap gap-3 p-4 bg-slate-50 rounded-2xl items-center border border-slate-100">
                                                    <input type="time" value={slot.start} onChange={(e)=>updateSlot(idx,'start',e.target.value)} className="p-2 rounded-lg font-bold text-xs border border-slate-200 outline-none w-24 text-center"/> <span className="text-slate-300">-</span>
                                                    <input type="time" value={slot.end} onChange={(e)=>updateSlot(idx,'end',e.target.value)} className="p-2 rounded-lg font-bold text-xs border border-slate-200 outline-none w-24 text-center"/>
                                                    <input type="text" value={slot.s} onChange={(e)=>updateSlot(idx,'s',e.target.value)} placeholder="수업명" className="flex-1 min-w-[150px] p-2 px-4 rounded-lg font-black text-sm border border-slate-200 outline-none focus:border-indigo-400"/>
                                                    <button onClick={()=>removeSlot(idx)} className="p-2 text-red-400 hover:bg-red-50 rounded-lg"><Icon name="trash"/></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                
                                <div className="bg-white p-10 rounded-3xl shadow-sm border border-slate-100 overflow-x-auto custom-scrollbar">
                                    <div className="min-w-[800px] relative">
                                        <div className="flex ml-14 mb-4">{['월','화','수','목','금'].map(d=><div key={d} className="flex-1 text-center font-black text-lg text-slate-800">{d}</div>)}</div>
                                        <div className="relative h-[800px]">
                                            {Array.from({length: 11}, (_, i) => 9 + i).map(h => (<div key={h} className="absolute w-full flex items-start" style={{top: `${(h-9)*80}px`}}><span className="w-14 text-[10px] font-black text-slate-400 text-right pr-4 -mt-2">{h}:00</span><div className="flex-1 border-t border-slate-100"></div></div>))}
                                            <div className="absolute top-0 left-14 right-0 bottom-0 flex">
                                                {['월','화','수','목','금'].map(d=>(
                                                    <div key={d} className="flex-1 relative border-l border-slate-50">
                                                        {(schedule[d]||[]).map((slot, idx)=>{
                                                            const top = (timeToMinutes(slot.start)-540)*(80/60); const height = (timeToMinutes(slot.end)-timeToMinutes(slot.start))*(80/60);
                                                            return (
                                                                <div key={idx} className={`absolute left-1 right-1 rounded-2xl p-2 overflow-hidden shadow-sm flex flex-col justify-center text-center hover:scale-[1.02] transition-transform ${getBlockStyle(slot.s)}`} style={{top:`${top}px`, height:`${height}px`}}>
                                                                    <span className="font-black text-[12px] leading-tight truncate">{slot.s}</span>
                                                                    {height>40 && <span className="text-[9px] font-bold opacity-70 mt-1">{slot.start}-{slot.end}</span>}
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 4. 제출 현황판 */}
                        {activeTab === 'status' && role === 'teacher' && (
                            <div className="bg-white rounded-3xl shadow-sm border border-slate-100 p-8 overflow-x-auto animate-in">
                                <h3 className="text-2xl font-black mb-2">학생별 제출 현황 통계</h3>
                                <p className="text-slate-500 text-xs font-bold mb-8">과제 제출 및 확인 현황 매트릭스</p>
                                <table className="w-full text-left min-w-[800px] border-collapse">
                                    <thead>
                                        <tr className="border-b-2 border-slate-200 bg-slate-50/50">
                                            <th className="p-5 font-black text-slate-500 uppercase text-[11px] sticky left-0 bg-slate-50 z-10">학생 명단</th>
                                            {tasks.filter(t=>t.taskType!=='일반 공지').map(t=>(
                                                <th key={t.id} className="p-5 font-black text-slate-700 min-w-[160px] border-l border-slate-100">
                                                    <span className="text-[9px] text-indigo-500 block mb-1 uppercase">{t.subjectId}</span>
                                                    <p className="text-[13px] truncate">{t.title}</p>
                                                </th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {students.map(s => {
                                            return (
                                                <tr key={s.id} className="hover:bg-indigo-50/30 transition-colors">
                                                    <td className="p-5 font-black text-base sticky left-0 bg-white shadow-[2px_0_5px_rgba(0,0,0,0.02)]">{s.name}</td>
                                                    {tasks.filter(t=>t.taskType!=='일반 공지').map(t=>{
                                                        const sub = submissions[`${t.id}_${s.name}`]||{student:false, teacher:false};
                                                        return (
                                                            <td key={t.id} className="p-5 border-l border-slate-50">
                                                                <div className="flex items-center gap-3">
                                                                    <div className={`w-3 h-3 rounded-full ${sub.student?'bg-indigo-600 shadow-inner':'bg-slate-200'}`}></div>
                                                                    <button onClick={()=>toggleSubmission(t.id, s.name, 'teacher')} className={`px-3 py-1.5 rounded-lg text-[10px] font-black transition-colors ${sub.teacher?'bg-green-500 text-white shadow-md':'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}>{sub.teacher?<Icon name="check" size={12}/>:'확인'}</button>
                                                                </div>
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        )}

                        {/* 5. 활동 승인 리스트 */}
                        {activeTab === 'approval' && (
                            <div className="bg-white p-10 rounded-3xl shadow-sm border border-slate-100 animate-in">
                                <div className="flex justify-between items-center mb-8">
                                    <h3 className="text-2xl font-black">{role==='teacher'?'활동 보고 승인 목록':'조교 활동 보고 작성'}</h3>
                                    <button onClick={()=>{setEditingTask({taskType:'개별 과제'}); setIsModalOpen('task');}} className="bg-indigo-600 text-white px-5 py-3 rounded-xl font-black text-[12px] shadow-xl hover:bg-indigo-700 hover:-translate-y-1 transition-all flex items-center gap-2"><Icon name="plus" size={14}/> 새 활동 작성</button>
                                </div>
                                <div className="space-y-4">
                                    {tasks.length === 0 && <p className="text-slate-400 italic text-center py-20 font-bold border-2 border-dashed border-slate-200 rounded-3xl">등록된 내역이 없습니다.</p>}
                                    {tasks.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map(t => (
                                        <div key={t.id} className="p-6 md:p-8 bg-slate-50 rounded-[2rem] border border-slate-200 flex flex-col md:flex-row md:items-center justify-between gap-6 hover:shadow-md transition-shadow">
                                            <div>
                                                <span className={`text-[10px] font-black px-2.5 py-1 rounded-md ${t.taskType==='일반 공지'?'bg-red-100 text-red-700':t.taskType==='그룹 과제'?'bg-purple-100 text-purple-700':'bg-indigo-100 text-indigo-700'}`}>{t.taskType} | {t.subjectId}</span>
                                                <h4 className="font-black text-xl mt-3 mb-2">{t.title}</h4>
                                                <p className="text-sm text-slate-500 line-clamp-2">{t.content}</p>
                                            </div>
                                            <div className="flex flex-wrap gap-2 shrink-0 border-t md:border-none pt-4 md:pt-0 border-slate-200">
                                                <span className={`px-4 py-2.5 rounded-xl text-xs font-black flex items-center justify-center ${t.status==='approved'?'bg-green-100 text-green-700 border border-green-200':'bg-orange-100 text-orange-700 border border-orange-200'}`}>{t.status==='approved'?'승인됨':'대기중'}</span>
                                                <button onClick={()=>setEditingTask(t)||setIsModalOpen('task')} className="px-4 py-2.5 bg-white border border-slate-200 rounded-xl text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 transition-colors"><Icon name="edit" size={16}/></button>
                                                {role==='teacher' && t.status==='pending' && <button onClick={()=>db.doc(`artifacts/${appId}/public/data/tasks/${t.id}`).update({status:'approved'})} className="px-6 py-2.5 bg-indigo-600 text-white rounded-xl text-xs font-black shadow-md hover:bg-indigo-700 flex items-center gap-2"><Icon name="check" size={14}/> 승인</button>}
                                                {role==='teacher' && <button onClick={()=>db.doc(`artifacts/${appId}/public/data/tasks/${t.id}`).delete()} className="px-4 py-2.5 bg-red-50 text-red-500 rounded-xl hover:bg-red-100 transition-colors"><Icon name="trash" size={16}/></button>}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modals Dispatcher */}
                    {isModalOpen === 'bible' && <FormModal title="성경 범위 설정" initialData={classSettings} fields={[{name:'bibleRange', label:'읽을 범위 입력'}]} onSubmit={(d)=>db.doc(`artifacts/${appId}/public/data/settings/classConfig`).set(d,{merge:true}).then(()=>setIsModalOpen(null))} onClose={()=>setIsModalOpen(null)}/>}
                    {isModalOpen === 'editSubject' && selectedSubject && <FormModal title="과목 설정" initialData={selectedSubject} fields={[{name:'representative', label:'조교 이름', type:'select', options:['미정', ...students.map(s=>s.name)]}, {name:'driveUrl', label:'자료실 링크 (구글 드라이브)'}, {name:'hiClassUrl', label:'제출 링크 (하이클래스)'}]} onSubmit={(d)=>db.doc(`artifacts/${appId}/public/data/subjects/${selectedSubject.id}`).update(d).then(()=>{setSelectedSubject({...selectedSubject,...d}); setIsModalOpen(null);})} onClose={()=>setIsModalOpen(null)}/>}
                    {isModalOpen === 'task' && <FormModal title={editingTask?.id ? "활동 수정" : "새 활동 작성"} initialData={editingTask} fields={[{name:'title', label:'과제명/공지명'}, {name:'content', label:'상세 내용 (학생들에게 보일 내용)', type:'textarea'}, {name:'subjectId', label:'과목 선택', type:'select', options:subjects.map(s=>s.title)}, {name:'taskType', label:'분류 (팀 제출 여부 결정)', type:'select', options:['개별 과제', '그룹 과제', '일반 공지']}, {name:'dueDate', label:'마감 날짜 (달력에 표시됨)', type:'date'}]} onSubmit={handleAddTask} onClose={()=>setIsModalOpen(null)}/>}
                    {groupSubmitConfig && <GroupSubmitModal config={groupSubmitConfig} students={students} onSave={handleGroupSubmit} onClose={()=>setGroupSubmitConfig(null)}/>}
                </div>
            );
        }

        // 로그인 화면
        function LoginScreen({ onLogin }) {
            const [pin, setPin] = useState('');
            const [isTeacher, setIsTeacher] = useState(false);
            const names = ['강태원', '김남우', '원의재', '현준서', '강서연', '유명희', '권새롬', '김사랑', '김현우'];
            const [sn, setSn] = useState(names[0]);

            const handleLogin = () => {
                if(isTeacher) {
                    if(pin==='2026!') onLogin({name:'관리자', role:'teacher'});
                    else alert('비밀번호 오류');
                } else {
                    if(pin==='1111') onLogin({name:sn, role:'student'});
                    else alert('PIN 오류');
                }
            };

            return (
                <div className="fixed inset-0 bg-slate-900 flex items-center justify-center p-6 z-50">
                    <div className="bg-white w-full max-w-md rounded-[3rem] p-10 md:p-12 shadow-2xl text-center relative overflow-hidden animate-in">
                        <button onClick={()=>setIsTeacher(!isTeacher)} className="absolute top-6 right-6 p-2 text-slate-300 hover:text-indigo-600 transition-colors"><Icon name="settings" size={20}/></button>
                        <div className="w-20 h-20 bg-indigo-50 rounded-3xl flex items-center justify-center mx-auto mb-8 text-indigo-600 shadow-inner"><Icon name="dashboard" size={40} /></div>
                        <h2 className="text-3xl font-black text-slate-900 mb-2 tracking-tighter">Vision High</h2>
                        <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-10">{isTeacher ? 'Teacher Mode' : 'Student Portal'}</p>
                        <div className="space-y-4 text-slate-900">
                            {!isTeacher && (<div className="text-left"><label className="text-[10px] font-black text-slate-400 uppercase block ml-2 mb-2">학생 이름 선택</label><select value={sn} onChange={e=>setSn(e.target.value)} className="w-full bg-slate-50 border border-slate-200 px-6 py-4 rounded-2xl font-bold appearance-none text-center outline-none">{names.map(n=><option key={n} value={n}>{n}</option>)}</select></div>)}
                            <div className="text-left"><label className="text-[10px] font-black text-slate-400 uppercase block ml-2 mb-2">{isTeacher ? '관리자 비밀번호' : '접속 PIN 번호'}</label><input type="password" value={pin} onChange={e=>setPin(e.target.value)} placeholder={isTeacher?'2026!':'1111'} className="w-full bg-slate-50 border border-slate-200 px-6 py-4 rounded-2xl font-black text-center outline-none focus:ring-4 focus:ring-indigo-100" onKeyDown={e=>e.key==='Enter'&&handleLogin()}/></div>
                            <button onClick={handleLogin} className="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl hover:bg-indigo-700 transition-all mt-4 hover:-translate-y-1">시스템 접속</button>
                        </div>
                    </div>
                </div>
            );
        }

        function MainRoot() {
            const [authUser, setAuthUser] = useState(null);
            if (!authUser) return <LoginScreen onLogin={setAuthUser} />;
            return <App authUser={authUser} setAuthUser={setAuthUser} />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainRoot />);
    </script>
</body>
</html>
